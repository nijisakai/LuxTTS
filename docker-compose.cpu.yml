# docker-compose.cpu.yml
# CPU 版本，无需 NVIDIA GPU
# 用法:
#   Docker:  docker compose -f docker-compose.cpu.yml up -d
#   Podman:  podman-compose -f docker-compose.cpu.yml up -d

services:
  luxtts:
    image: luxtts-cpu
    build:
      context: .
      dockerfile: Dockerfile.cpu
      network: host
    container_name: luxtts-cpu
    ports:
      - "9880:9880"
    volumes:
      - ./audio:/app/audio:z
    environment:
      - DEVICE=cpu
      - PORT=9880
      - NUM_STEPS=4
      - GUIDANCE_SCALE=3.0
      - T_SHIFT=0.5
      - SPEED=1.0
      - RMS=0.01
      - REF_DURATION=5
      - THREADS=4
    restart: unless-stopped
