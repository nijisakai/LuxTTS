# docker-compose.yml
# 兼容 Docker Compose 和 Podman Compose
# 用法:
#   Docker:  docker compose up -d
#   Podman:  podman-compose up -d

services:
  luxtts:
    image: luxtts-gpu
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: luxtts-gpu
    ports:
      - "9880:9880"
    volumes:
      - ./audio:/app/audio:z          # :z 标记兼容 Podman SELinux
    environment:
      - DEVICE=cuda
      - PORT=9880
      - NUM_STEPS=4
      - GUIDANCE_SCALE=3.0
      - T_SHIFT=0.5
      - SPEED=1.0
      - RMS=0.01
      - REF_DURATION=5
      - THREADS=4
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # Podman 不支持 deploy.resources，用 --device 替代
    # 使用 podman 时请参考下方 podman-run.sh
