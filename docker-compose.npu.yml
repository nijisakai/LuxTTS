# docker-compose.npu.yml
# Intel NPU 版本（通过 OpenVINO 加速）
# 仅适用于原生 Linux（需要 /dev/accel 设备）
# WSL2 不支持 NPU 透传，WSL2 用户请用 docker-compose.cpu.yml 或 Windows 原生运行
#
# 用法:
#   Docker:  docker compose -f docker-compose.npu.yml up -d
#   Podman:  podman-compose -f docker-compose.npu.yml up -d

services:
  luxtts:
    image: luxtts-npu
    build:
      context: .
      dockerfile: Dockerfile.npu
      network: host
    container_name: luxtts-npu
    ports:
      - "9880:9880"
    volumes:
      - ./audio:/app/audio:z
    devices:
      - /dev/accel:/dev/accel    # Intel NPU 设备
    group_add:
      - render
      - video
    environment:
      - DEVICE=npu
      - OPENVINO_DEVICE=NPU
      - PORT=9880
      - NUM_STEPS=4
      - GUIDANCE_SCALE=3.0
      - T_SHIFT=0.5
      - SPEED=1.0
      - RMS=0.01
      - REF_DURATION=5
      - THREADS=4
    restart: unless-stopped
